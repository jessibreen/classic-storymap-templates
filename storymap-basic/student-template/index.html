<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title></title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="mainWindow">

    <!-- Header bar: title, subtitle, logo -->
    <div id="header">
      <div id="headerText">
        <h1 id="title"></h1>
        <h2 id="subtitle"></h2>
      </div>
      <div class="socialArea">
        <div class="logoContainer">
          <a id="logoLink" target="_blank" rel="noopener noreferrer" tabindex="-1">
            <img id="logoImg" class="logoImg" alt="">
          </a>
        </div>
      </div>
    </div>

    <!-- Map: fills the remaining viewport height -->
    <div id="mapDiv">
      <!-- Collapsible info panel overlaid at bottom-left (mirrors the legend in the original) -->
      <div id="legendCon">
        <div id="legendToggle">
          <div id="legToggleIcon" class="toggle-icon">&#9662;</div>
          <div id="legTogText">About this map</div>
        </div>
        <div id="legendDiv"></div>
      </div>

      <iframe
        id="mapFrame"
        title="Interactive map"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>

      <a id="mapSourceLink" class="map-source-link"
         target="_blank" rel="noopener noreferrer">Open full map &#8599;</a>
    </div>

  </div>

  <script src="story.config.js"></script>
  <script src="app.js"></script>
</body>
</html>
